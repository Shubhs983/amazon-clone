<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Amazon Clone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

        /* Navbar */
        .navbar {
            background-color: #131921;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .navbar .logo { color: white; font-size: 24px; font-weight: bold; }
        .navbar .logo span { color: #ff9900; }
        .search-bar {
            flex: 1;
            display: flex;
        }
        .search-bar input {
            width: 100%;
            padding: 8px 12px;
            font-size: 15px;
            border: none;
            outline: none;
        }
        .search-bar button {
            background: #ff9900;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 18px;
        }
        .nav-links { color: white; font-size: 13px; cursor: pointer; }
        .nav-links:hover { text-decoration: underline; }

        /* Banner */
        .banner {
            background: linear-gradient(to bottom, #ccc, #f5f5f5);
            text-align: center;
            padding: 15px;
            font-size: 13px;
            color: #333;
        }

        /* Product Grid */
        .page { background: #e3e6e6; min-height: 100vh; padding: 20px; }
        .section-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; color: #111; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }
        .product-card {
            background: white;
            border-radius: 4px;
            padding: 15px;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .product-card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 10px;
        }
        .product-card .category {
            font-size: 11px;
            color: #ff9900;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .product-card h3 {
            font-size: 14px;
            color: #111;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .product-card .price {
            font-size: 20px;
            color: #B12704;
            font-weight: bold;
        }
        .product-card .price span {
            font-size: 12px;
            vertical-align: super;
        }
        .add-to-cart {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            background: #ff9900;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        .add-to-cart:hover { background: #e68a00; }

        /* Footer */
        .footer {
            background: #131921;
            color: #ddd;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">ama<span>z</span>on</div>
    <form class="search-bar" method="get" action="/products">
        <input type="text" name="search" placeholder="Search products..."
               th:value="${search}"/>
        <button type="submit">🔍</button>
    </form>
    <div class="nav-links" th:if="${session.user}" th:text="'Hello, ' + ${session.user}"></div>
    <div class="nav-links" th:if="${session.user}"><a href="/logout" style="color:white;">Logout</a></div>
    <div class="nav-links" th:unless="${session.user}"><a href="/login" style="color:white;">Hello, Sign in</a></div>
    <div class="nav-links">Returns & Orders</div>
    <div class="nav-links">
        <a href="/cart" style="color:white; text-decoration:none;">
            🛒 Cart
            <span th:if="${cartCount != null and cartCount > 0}"
                  style="background:#ff9900; color:black; border-radius:50%; padding:2px 7px; font-size:12px; font-weight:bold;"
                  th:text="${cartCount}">
        </span>
        </a>
    </div>
</div>

<!-- Banner -->
<div class="banner">
    🌟 Big Spring Sale — Save up to 50% on top products!
</div>

<!-- Products -->
<div class="page">
    <div class="section-title">Today's Deals</div>
    <div class="product-grid">
        <div class="product-card" th:each="product : ${products}">
            <img th:src="${product.imageUrl}" alt="product"/>
            <div class="category" th:text="${product.category.name}"></div>
            <h3 th:text="${product.name}"></h3>
            <div class="price">
                <span>$</span>
                <span th:text="${product.price}"></span>
            </div>
            <form method="post" th:action="@{/cart/add}">
                <input type="hidden" name="productId" th:value="${product.id}"/>
                <button class="add-to-cart" type="submit">Add to Cart</button>
            </form>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    <p>© 2024 Amazon Clone. Built with Java + Spring Boot + MySQL</p>
</div>

</body>
</html>
