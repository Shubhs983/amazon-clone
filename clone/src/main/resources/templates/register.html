<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Amazon Clone - Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f3f3f3; }
        .navbar { background: #131921; padding: 10px 20px; text-align: center; }
        .logo { color: white; font-size: 28px; font-weight: bold; }
        .logo span { color: #ff9900; }
        .container {
            max-width: 350px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        h2 { font-size: 22px; margin-bottom: 15px; }
        label { font-size: 13px; font-weight: bold; display: block; margin-bottom: 4px; }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #aaa;
            border-radius: 3px;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #ff9900; box-shadow: 0 0 3px #ff9900; }
        .btn {
            width: 100%;
            padding: 10px;
            background: #ff9900;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover { background: #e68a00; }
        .error { color: red; font-size: 13px; margin-bottom: 10px; }
        .login-link { text-align: center; margin-top: 15px; font-size: 13px; }
        .login-link a { color: #0066c0; text-decoration: none; }
    </style>
</head>
<body>
<div class="navbar"><div class="logo">ama<span>z</span>on</div></div>
<div class="container">
    <h2>Create Account</h2>
    <p class="error" th:if="${error}" th:text="${error}"></p>
    <form method="post" action="/register">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your name" required/>
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email" required/>
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a password" required/>
        <button class="btn" type="submit">Create Account</button>
    </form>
    <div class="login-link">
        Already have an account? <a href="/login">Sign in</div>
</div>
</body>
</html>
